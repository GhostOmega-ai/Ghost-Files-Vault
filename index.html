<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Ghost Files Vault">
  <title>Ghost Files Vault</title>
  <link rel="stylesheet" href="css/files.css">
  <script type="module" src="js/app.js"></script>
</head>
<body>
  <div class="app-shell" id="app">
    <header class="vault-header">
      <div class="vault-header__identity">
        <img class="vault-header__logo" src="assets/files-vault.png" alt="Ghost Files Vault">
        <div class="vault-header__copy">
          <h1>Files Vault</h1>
          <p id="file-count">0 files</p>
        </div>
      </div>

      <div class="vault-header__actions" aria-label="Vault controls">
        <button class="header-action header-action--primary" id="add-file-button" type="button">
          <span aria-hidden="true">＋</span> File
        </button>
        <button class="header-action" id="add-album-button" type="button">
          <span aria-hidden="true">＋</span> Album
        </button>
        <input id="file-input" type="file" multiple hidden>
      </div>
    </header>

    <main class="content" id="main-content">
      <section class="storage-panel storage-panel--compact" aria-label="Storage overview">
        <span class="storage-panel__label">Stored locally</span>
        <strong id="storage-summary">0 B</strong>
        <div class="storage-panel__bar" aria-hidden="true">
          <span id="storage-bar"></span>
        </div>
      </section>

      <section class="section-heading">
        <div>
          <p class="eyebrow">COLLECTIONS</p>
          <h2 id="view-title">Your folders</h2>
        </div>
        <button class="text-button hidden" id="back-button" type="button">← Folders</button>
      </section>

      <div id="album-grid" class="album-grid" aria-live="polite"></div>

      <section id="album-view" class="album-view hidden" aria-live="polite">
        <div class="album-view__toolbar">
          <input id="search-input" class="search-input" type="search" placeholder="Search this folder" autocomplete="off">
          <select id="sort-select" class="sort-select" aria-label="Sort files">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="name-asc">Name A–Z</option>
            <option value="name-desc">Name Z–A</option>
            <option value="size-desc">Largest</option>
          </select>
        </div>
        <div id="file-list" class="file-list"></div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Ghost navigation">
      <a class="bottom-nav__item" href="../" aria-label="Home">
        <img src="assets/home.png" alt="">
      </a>
      <button class="bottom-nav__item bottom-nav__item--primary" id="hide-button" type="button" aria-label="Hide Ghost">
        <img src="assets/hide.png" alt="">
      </button>
      <a class="bottom-nav__item" href="../settings/" aria-label="Settings">
        <img src="assets/settings.png" alt="">
      </a>
    </nav>
  </div>

  <dialog class="ghost-dialog" id="album-picker-dialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-card__header">
        <div>
          <p class="eyebrow">UPLOAD</p>
          <h2>Choose a folder</h2>
        </div>
        <button class="icon-button" value="cancel" aria-label="Close">×</button>
      </div>
      <div id="album-picker-list" class="picker-list"></div>
    </form>
  </dialog>

  <dialog class="ghost-dialog" id="create-album-dialog">
    <form method="dialog" class="dialog-card" id="create-album-form">
      <div class="dialog-card__header">
        <div>
          <p class="eyebrow">NEW</p>
          <h2>Create folder</h2>
        </div>
        <button class="icon-button" value="cancel" aria-label="Close">×</button>
      </div>
      <label class="field">
        <span>Folder name</span>
        <input id="album-name-input" maxlength="40" required placeholder="e.g. Work documents">
      </label>
      <button class="primary-button primary-button--full" value="default">Create folder</button>
    </form>
  </dialog>

  <dialog class="ghost-dialog" id="pin-dialog">
    <form method="dialog" class="dialog-card" id="pin-form">
      <div class="dialog-card__header">
        <div>
          <p class="eyebrow">PRIVATE</p>
          <h2>Enter PIN</h2>
        </div>
        <button class="icon-button" value="cancel" aria-label="Close">×</button>
      </div>
      <label class="field">
        <span>PIN</span>
        <input id="pin-input" type="password" inputmode="numeric" maxlength="12" required autocomplete="off">
      </label>
      <p class="form-error hidden" id="pin-error">Incorrect PIN.</p>
      <button class="primary-button primary-button--full" value="default">Unlock</button>
    </form>
  </dialog>

  <dialog class="ghost-dialog ghost-dialog--viewer" id="viewer-dialog">
    <div class="viewer">
      <header class="viewer__header">
        <div class="viewer__title-wrap">
          <p class="eyebrow">FILE VIEWER</p>
          <h2 id="viewer-title">File</h2>
        </div>
        <button class="icon-button" id="viewer-close" type="button" aria-label="Close viewer">×</button>
      </header>
      <div class="viewer__body" id="viewer-body"></div>
      <footer class="viewer__footer">
        <button class="secondary-button" id="move-file-button" type="button">Move</button>
        <button class="secondary-button danger-button" id="delete-file-button" type="button">Delete</button>
        <button class="primary-button" id="download-file-button" type="button">Download</button>
      </footer>
    </div>
  </dialog>

  <dialog class="ghost-dialog" id="move-dialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-card__header">
        <div>
          <p class="eyebrow">MOVE FILE</p>
          <h2>Choose a folder</h2>
        </div>
        <button class="icon-button" value="cancel" aria-label="Close">×</button>
      </div>
      <div id="move-picker-list" class="picker-list"></div>
    </form>
  </dialog>

  <div class="toast-region" id="toast-region" aria-live="polite"></div>
</body>
</html>

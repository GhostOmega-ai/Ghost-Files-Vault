<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Ghost Files Vault">
  <title>Ghost Files Vault</title>
  <link rel="stylesheet" href="css/files.css">
  <script type="module" src="js/app.js"></script>
</head>
<body>
  <main class="app" id="app">
    <header class="topbar">
      <button id="back-button" class="icon-btn" type="button" aria-label="Back">←</button>
      <div>
        <small>GHOST</small>
        <h1 id="page-title">File Vault</h1>
      </div>
      <button id="info-button" class="icon-btn" type="button" aria-label="Information">ⓘ</button>
    </header>

    <section class="hero" id="main-hero">
      <img src="assets/files-vault.png" alt="" class="hero-icon">

      <div class="hero-copy">
        <h2>Folders</h2>
        <p id="hero-summary">0 files stored</p>
      </div>

      <div class="hero-actions">
        <button class="primary" id="add-file-button" type="button">+ File</button>
        <button class="secondary" id="add-album-button" type="button">+ Folder</button>
      </div>

      <input id="file-input" type="file" multiple hidden>
    </section>

    <section class="stats" id="main-stats">
      <div><b id="file-count">0</b><span>Files</span></div>
      <div><b id="folder-count">2</b><span>Folders</span></div>
      <div><b id="storage-summary">0 MB</b><span>Storage</span></div>
    </section>

      <section class="section-heading section-heading--folders"><h2 id="view-title" class="sr-only">Your folders</h2></section>

      <div id="album-grid" class="album-grid" aria-live="polite"></div>

      <section id="album-view" class="album-view hidden" aria-live="polite">
        <div class="album-view__toolbar">
          <input id="search-input" class="search-input" type="search" placeholder="Search this folder" autocomplete="off">
          <select id="sort-select" class="sort-select" aria-label="Sort files">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="name-asc">Name A–Z</option>
            <option value="name-desc">Name Z–A</option>
            <option value="size-desc">Largest</option>
          </select>
        </div>
        <div id="file-list" class="file-list"></div>
      </section>
    </main>

    <nav class="vault-nav" aria-label="Ghost navigation">
      <button id="vault-home-button" type="button" aria-label="Home"><img src="assets/home.png" alt=""></button>
      <button id="hide-button" type="button" aria-label="Hide"><img src="assets/hide.png" alt=""></button>
      <button id="vault-settings-button" type="button" aria-label="Settings"><img src="assets/settings.png" alt=""></button>
    </nav>
  </main>

  <dialog class="ghost-dialog" id="album-picker-dialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-card__header">
        <div>
          <p class="eyebrow">UPLOAD</p>
          <h2>Choose a folder</h2>
        </div>
        <button class="icon-button" value="cancel" aria-label="Close">×</button>
      </div>
      <div id="album-picker-list" class="picker-list"></div>
    </form>
  </dialog>

  <dialog class="ghost-dialog" id="create-album-dialog">
    <form method="dialog" class="dialog-card" id="create-album-form">
      <div class="dialog-card__header dialog-card__header--simple">
        <div>
          <p class="eyebrow">NEW</p>
          <h2>Create folder</h2>
          <p class="dialog-description">Give your folder a name.</p>
        </div>
      </div>

      <label class="field">
        <span class="sr-only">Folder name</span>
        <input id="album-name-input" type="text" maxlength="40" required
          placeholder="e.g. Work documents" autocomplete="off"
          autocapitalize="words" enterkeyhint="done" spellcheck="true">
      </label>

      <div class="dialog-actions">
        <button class="secondary" type="button" id="cancel-album-button">Cancel</button>
        <button class="primary" type="submit">Create</button>
      </div>
    </form>
  </dialog>

  <dialog class="ghost-dialog" id="pin-dialog">
    <form method="dialog" class="dialog-card" id="pin-form">
      <div class="dialog-card__header">
        <div>
          <p class="eyebrow">PRIVATE</p>
          <h2>Enter PIN</h2>
        </div>
        <button class="icon-button" value="cancel" aria-label="Close">×</button>
      </div>
      <label class="field">
        <span>PIN</span>
        <input id="pin-input" type="password" inputmode="numeric" maxlength="12" required autocomplete="off">
      </label>
      <p class="form-error hidden" id="pin-error">Incorrect PIN.</p>
      <button class="primary-button primary-button--full" value="default">Unlock</button>
    </form>
  </dialog>

  <dialog class="ghost-dialog ghost-dialog--viewer" id="viewer-dialog">
    <div class="viewer">
      <header class="viewer__header">
        <div class="viewer__title-wrap">
          <p class="eyebrow">FILE VIEWER</p>
          <h2 id="viewer-title">File</h2>
        </div>
        <button class="icon-button" id="viewer-close" type="button" aria-label="Close viewer">×</button>
      </header>
      <div class="viewer__body" id="viewer-body"></div>
      <footer class="viewer__footer">
        <button class="secondary-button" id="move-file-button" type="button">Move</button>
        <button class="secondary-button danger-button" id="delete-file-button" type="button">Delete</button>
        <button class="primary-button" id="download-file-button" type="button">Download</button>
      </footer>
    </div>
  </dialog>

  <dialog class="ghost-dialog" id="move-dialog">
    <form method="dialog" class="dialog-card">
      <div class="dialog-card__header">
        <div>
          <p class="eyebrow">MOVE FILE</p>
          <h2>Choose a folder</h2>
        </div>
        <button class="icon-button" value="cancel" aria-label="Close">×</button>
      </div>
      <div id="move-picker-list" class="picker-list"></div>
    </form>
  </dialog>

  <div class="toast-region" id="toast-region" aria-live="polite"></div>
</body>
</html>
